name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - kernel
          - middleware
          - workflow
          - interfaces
          - plan
          - axontest
          - providers/google
          - providers/anthropic
          - providers/openai
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test -race -count=1 -v ./...

      - name: Run vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...
